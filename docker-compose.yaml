services:
  heartbeat-monitor-dev:
    profiles: [ "dev" ]
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ENV=docker
    ports:
      - "81:80"
    restart: unless-stopped
    command: uvicorn heartbeat_monitor.main:app --host 0.0.0.0 --port 80 --reload
    volumes:
      - ./src/heartbeat_monitor:/app/src/heartbeat_monitor
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - heartbeat-monitor-net

networks:
  heartbeat-monitor-net:
    driver: bridge
