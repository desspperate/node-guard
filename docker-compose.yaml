services:
  node-guard-dev-1:
    profiles: [ "dev" ]
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "81:80"
    restart: unless-stopped
    command: uvicorn node_guard.main:app --host 0.0.0.0 --port 80 --reload
    volumes:
      - ./src/node_guard:/app/src/node_guard
      - ./storage:/app/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - node-guard-net

  node-guard-dev-2:
    profiles: [ "dev" ]
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FASTAPI_TITLE=Node Guard 2
      - ADVERTISED_ADDRESS=http://host.docker.internal:82
      - SEED_NODE=http://host.docker.internal:81
    ports:
      - "82:80"
    restart: unless-stopped
    command: uvicorn node_guard.main:app --host 0.0.0.0 --port 80 --reload
    volumes:
      - ./src/node_guard:/app/src/node_guard
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - node-guard-net

  node-guard-dev-3:
    profiles: [ "dev" ]
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FASTAPI_TITLE=Node Guard 3
      - ADVERTISED_ADDRESS=http://host.docker.internal:83
      - SEED_NODE=http://host.docker.internal:81
    ports:
      - "83:80"
    restart: unless-stopped
    command: uvicorn node_guard.main:app --host 0.0.0.0 --port 80 --reload
    volumes:
      - ./src/node_guard:/app/src/node_guard
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - node-guard-net

networks:
  node-guard-net:
    driver: bridge
